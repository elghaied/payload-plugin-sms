name: Release

on:
  push:
    tags: ['v*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:int

  release:
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Extract changelog for this version
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' to get the version number
          version="${TAG_NAME#v}"

          # Extract the section for this version from CHANGELOG.md
          # Handles both bracketed (## [1.2.0]) and unbracketed (## 1.2.0) formats
          body=$(awk -v ver="$version" '
            /^## / {
              if (found) exit
              if (index($0, "[" ver "]") || index($0, " " ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)

          # If no changelog section found, fall back to a simple message
          if [ -z "$body" ]; then
            body="Release ${TAG_NAME}"
          fi

          # Write to file for the release step (avoids escaping issues)
          echo "$body" > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-body.md

      # npm CLI 11.5+ exchanges the GitHub Actions OIDC token (granted by
      # `id-token: write` above) for a short-lived publish token via npm
      # Trusted Publishers — no NPM_TOKEN secret needed.
      - run: npm install -g npm@latest
      - name: Publish to npm
        run: npm publish --provenance --access public
